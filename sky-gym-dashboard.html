<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    projectId:         "truck-f4c15",

<style>
:root{
  --gold:#C8A84B;--gl:#E8C76A;--gd:#8a6a20;
  --dark:#0A0A0A;--d2:#111;--d3:#1A1A1A;--d4:#222;
  --txt:#E8E8E8;--dim:#666;--dim2:#3a3a3a;
  --red:#e74c3c;--green:#27ae60;--blue:#2471a3;--acc:#FF4E1A;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--txt);min-height:100vh;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--dark);padding:11px 26px;border-radius:4px;font-weight:700;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.on{opacity:1;}
.sc{display:none;}.sc.on{display:block;}
.btn{padding:10px 18px;border:none;border-radius:3px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.bg{background:var(--gold);color:var(--dark);}.bg:hover{background:var(--gl);}
.bo{background:transparent;border:1px solid var(--gold);color:var(--gold);}.bo:hover{background:var(--gold);color:var(--dark);}
.br{background:var(--red);color:#fff;}.br:hover{background:#c0392b;}
.bb{background:var(--blue);color:#fff;}.bb:hover{background:#1a5a8a;}
.sm{font-size:11px;padding:7px 13px;}

/* ── LOGIN ── */
#auth{min-height:100vh;display:none;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 50% 0%,rgba(200,168,75,.16),transparent 44%),linear-gradient(180deg,#0d0d0d,#070707);}
#auth.on{display:flex;}
.authbox{width:100%;max-width:430px;background:#151515;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;box-shadow:0 22px 70px rgba(0,0,0,.42);}
.authhead{padding:30px 26px 22px;text-align:center;background:linear-gradient(180deg,#211707,#121212);border-bottom:1px solid #29210e;}
.authlogo{font-size:31px;font-weight:900;line-height:1.2;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.authsub{font-size:12px;color:#8b8b8b;margin-top:7px;}
.authbody{padding:22px 26px 26px;}
.authbody .fl{margin-bottom:13px;}
.authbody .fl label{font-size:11px;color:#9a9a9a;margin-bottom:7px;}
.authbody .fl input{height:45px;background:#0d0d0d;border-color:#303030;border-radius:5px;font-size:14px;}
.authbody .fl input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,75,.1);}
.authactions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px;}
.authactions .btn{height:46px;border-radius:5px;font-size:14px;}
.authmsg{font-size:12px;color:var(--dim);line-height:1.8;margin-top:15px;text-align:center;min-height:20px;}
.authsocial{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid #252525;}
.authsocial a{width:42px;height:42px;border:1px solid #303030;background:#101010;color:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s;}
.authsocial a:hover{border-color:var(--gold);background:var(--gold);color:var(--dark);transform:translateY(-1px);}
.authsocial svg{width:19px;height:19px;display:block;fill:currentColor;}
.authpanel{display:none;}
.authpanel.on{display:block;}

/* ── S1 DASHBOARD ── */
#s1{max-width:960px;margin:0 auto;padding:26px 18px;}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid #1e1e1e;flex-wrap:wrap;gap:10px;}
.dlogo{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dlogo small{font-size:12px;font-weight:300;color:var(--dim);-webkit-text-fill-color:var(--dim);display:block;}
.dhacts{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.coach{font-size:11px;color:var(--dim);background:#111;border:1px solid #222;border-radius:3px;padding:8px 10px;max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.demoMark{font-size:10px;color:var(--dark);background:var(--gl);border-radius:3px;padding:7px 9px;font-weight:900;display:none;}
.demoMark.on{display:block;}
.dstats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.dst{flex:1;min-width:100px;background:var(--d3);border:1px solid var(--d4);border-radius:4px;padding:14px;text-align:center;}
.dst .dv{font-size:26px;font-weight:900;color:var(--gold);}
.dst .dl{font-size:10px;color:var(--dim);margin-top:2px;}
.srow{display:flex;gap:10px;margin-bottom:16px;}
.srow input{flex:1;padding:11px 14px;background:var(--d3);border:1px solid #2a2a2a;border-radius:3px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;}
.srow input:focus{outline:none;border-color:var(--gold);}
.srow input::placeholder{color:var(--dim);}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:13px;}
.tc{background:var(--d3);border:1px solid #232323;border-radius:4px;overflow:hidden;transition:border-color .2s;}
.tc:hover{border-color:rgba(200,168,75,.4);}
.tch{padding:14px 16px;background:linear-gradient(135deg,#1d1d1d,#121212);border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:11px;}
.av{width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
.tn{font-size:14px;font-weight:700;}.tm{font-size:11px;color:var(--dim);margin-top:1px;}
.tcb{padding:12px 16px;}
.tss{display:flex;gap:7px;margin-bottom:12px;}
.tst{flex:1;background:#111;border-radius:3px;padding:7px 3px;text-align:center;}
.tst .tv{font-size:14px;font-weight:900;color:var(--gold);display:block;}
.tst .tl{font-size:10px;color:var(--dim);}
.tacts{display:flex;gap:6px;}
.subline{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;padding:8px 10px;background:#101010;border:1px solid #202020;border-radius:3px;font-size:11px;color:var(--dim);}
.codeline{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;padding:8px 10px;background:#0d0d0d;border:1px dashed #2a2a2a;border-radius:3px;font-size:11px;color:var(--dim);}
.codeval{color:var(--gold);font-weight:900;letter-spacing:1px;direction:ltr;}
.subpill{font-size:10px;font-weight:900;padding:3px 8px;border-radius:20px;color:#fff;white-space:nowrap;}
.subpill.ok{background:var(--green);}.subpill.soon{background:#b8860b;}.subpill.expired{background:var(--red);}.subpill.none{background:#444;}
.empty{text-align:center;padding:55px 20px;color:var(--dim);}
.empty .ei{font-size:42px;display:block;margin-bottom:10px;}
.ld{text-align:center;padding:45px;color:var(--dim);}
.sp{width:28px;height:28px;border:3px solid #1e1e1e;border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── S2 FORM ── */
#s2{max-width:880px;margin:0 auto;padding:26px 18px;}
.ftop{display:flex;align-items:center;gap:13px;margin-bottom:22px;}
.ftop h2{font-size:19px;font-weight:900;color:var(--gold);}
.bk{background:none;border:1px solid #333;color:var(--dim);padding:8px 15px;border-radius:3px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;}
.bk:hover{border-color:var(--gold);color:var(--gold);}
.fsec{background:var(--d3);border:1px solid #222;border-radius:4px;margin-bottom:13px;overflow:hidden;}
.fsh{padding:12px 17px;background:linear-gradient(135deg,#1d1d1d,#121212);border-bottom:1px solid #1e1e1e;font-size:13px;font-weight:700;color:var(--gold);}
.fsb{padding:16px 17px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fr.r1{grid-template-columns:1fr;}
.fr.r3{grid-template-columns:1fr 1fr 1fr;}
.fr.r4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fl label{display:block;font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:5px;}
.fl input,.fl select,.fl textarea{width:100%;padding:9px 12px;background:#111;border:1px solid #2a2a2a;border-radius:3px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--gold);}
.fl textarea{resize:vertical;min-height:55px;}
.fl select option{background:#111;}

/* day blocks */
.db{border:1px solid #232323;border-radius:3px;margin-bottom:9px;}
.dbh{padding:10px 14px;background:#111;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--gl);cursor:pointer;user-select:none;}
.dbh:hover{background:#161616;}
.dbb{padding:12px 14px;}
.rt{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);}
.rt input{width:14px;height:14px;accent-color:var(--gold);}

/* library select */
.libsel{width:100%;padding:8px 12px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:3px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:12px;margin-bottom:9px;}
.libsel:focus{outline:none;border-color:var(--gold);}
.libsel option,.libsel optgroup{background:#111;}

/* exercise cards */
.xlist{display:grid;gap:9px;margin-bottom:7px;}
.xcard{background:#0d0d0d;border:1px solid #252525;border-radius:4px;padding:10px;}
.xhead{display:grid;grid-template-columns:1fr auto 30px;gap:8px;align-items:center;margin-bottom:9px;}
.xname{width:100%;padding:8px 10px;background:#111;border:1px solid #2a2a2a;border-radius:3px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;}
.xweeks{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.xwk{background:#111;border:1px solid #222;border-radius:3px;padding:7px;}
.xwk label{display:block;font-size:10px;color:var(--gold);margin-bottom:5px;font-weight:700;}
.xwk input{width:100%;padding:7px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:3px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:12px;}
.xwk input+input{margin-top:4px;}
.xwk input:focus,.xname:focus{outline:none;border-color:var(--gold);}
.xwk input::placeholder,.xname::placeholder{color:var(--dim2);}
.xdel{background:#1a0808;border:1px solid #4a1010;color:var(--red);width:27px;height:27px;border-radius:3px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.xdel:hover{background:var(--red);color:#fff;}
.xadd{background:none;border:1px dashed #2a2a2a;color:var(--dim);padding:7px 13px;border-radius:3px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;width:100%;margin-top:3px;}
.xadd:hover{border-color:var(--gold);color:var(--gold);}
.wuin{width:100%;padding:8px 12px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:3px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:12px;margin-bottom:9px;}
.wuin:focus{outline:none;border-color:var(--gold);}
.wuin::placeholder{color:var(--dim2);}
.ffoot{display:flex;gap:9px;margin-top:18px;justify-content:flex-end;}

/* ── S3 PLAN ── */
#s3{background:var(--dark);}
.pb{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:var(--d3);border-bottom:1px solid #1e1e1e;flex-wrap:wrap;gap:9px;position:sticky;top:0;z-index:100;}
.pb .pn{font-size:16px;font-weight:900;color:var(--gold);}
.pbacts{display:flex;gap:7px;}

/* plan inner */
.plh{position:relative;padding:54px 20px 32px;text-align:center;background:linear-gradient(180deg,#1a1208,var(--dark));overflow:hidden;}
.plh::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,168,75,.15) 0%,transparent 70%);}
.plname{font-size:clamp(34px,6vw,58px);font-weight:900;line-height:1.05;position:relative;background:linear-gradient(135deg,var(--gl),var(--gold),var(--gd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.plsub{font-size:14px;color:#9a9a9a;margin-top:9px;position:relative;}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);max-width:620px;margin:24px auto 0;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden;position:relative;}
.sb{padding:16px 9px;text-align:center;border-left:1px solid #2a2a2a;background:rgba(28,28,28,.92);}
.sb:last-child{border-left:none;}
.sb .sv{font-size:20px;font-weight:900;color:var(--gold);display:block;}
.sb .sl{font-size:10px;color:#858585;}
.certsec{max-width:940px;margin:24px auto 0;padding:0 18px;position:relative;}
.certhead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px;}
.certtitle{font-size:18px;font-weight:900;color:var(--gold);}
.certsub{font-size:11px;color:#777;margin-top:3px;}
.certcount{font-size:11px;color:#111;background:var(--gold);padding:5px 10px;border-radius:20px;font-weight:900;white-space:nowrap;}
.certgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.certcard{background:linear-gradient(180deg,#1b1b1b,#131313);border:1px solid #272727;border-radius:7px;overflow:hidden;text-align:right;cursor:pointer;font-family:'Cairo',sans-serif;color:var(--txt);padding:0;transition:border-color .2s,transform .2s;}
.certcard:hover{border-color:rgba(200,168,75,.6);transform:translateY(-1px);}
.certthumb{height:105px;background:#0c0c0c;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #222;}
.certthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.certname{font-size:12px;font-weight:900;color:#eee;line-height:1.5;padding:9px 10px 2px;}
.certorg{font-size:10px;color:#777;padding:0 10px 10px;line-height:1.5;}
.pnote{max-width:700px;margin:22px auto;padding:0 20px;}
.pni{background:linear-gradient(135deg,#1a1408,#0f0f0f);border:1px solid rgba(200,168,75,.3);border-right:3px solid var(--gold);padding:15px 20px;border-radius:2px;}
.pni p{font-size:13px;color:#aaa;line-height:1.9;}
.pni strong{color:var(--gl);}
.wnav{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:26px 18px 0;max-width:940px;margin:0 auto;}
.wtab{min-height:96px;padding:13px 9px;border:1px solid #2a2a2a;background:linear-gradient(180deg,#1c1c1c,#151515);color:#8b8b8b;cursor:pointer;text-align:center;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .2s;border-radius:6px;}
.wtab.on{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.wtab:hover:not(.on){border-color:var(--gold);color:var(--gold);}
.wtab .wi{display:block;font-size:18px;margin-bottom:5px;}
.wtab .wr{display:block;font-size:10px;margin-top:5px;color:#39FF14;opacity:.95;line-height:1.5;}
.wtab.on .wr{color:var(--dark);}
.wcont{display:none;}.wcont.on{display:block;}
.dgrid{max-width:940px;margin:18px auto 52px;padding:0 18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:13px;}
.dc{background:linear-gradient(180deg,#1b1b1b,#141414);border:1px solid #242424;border-radius:7px;overflow:hidden;transition:border-color .2s,transform .2s;}
.dc:hover{border-color:rgba(200,168,75,.35);}
.dc.rest{background:#0d0d0d;border-style:dashed;display:flex;align-items:center;justify-content:center;min-height:100px;}
.rtxt{text-align:center;color:var(--dim);}
.rtxt .ri{font-size:28px;display:block;margin-bottom:5px;}
.rtxt h3{font-size:14px;color:#444;}
.rtxt p{font-size:11px;color:#2a2a2a;margin-top:3px;}
.dch{padding:14px 17px;background:linear-gradient(135deg,#222,#151515);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.dcn{font-size:17px;font-weight:900;color:var(--gold);}
.dcf{font-size:10px;color:#aaa;background:#242424;padding:4px 10px;border-radius:20px;}
.dcb{padding:14px 17px;}
.wusec{margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed #1a1a1a;}
.stl{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:6px;}
.wuli{font-size:12px;color:#39FF14;padding:3px 0;display:flex;align-items:center;gap:6px;}
.wuli::before{content:'›';color:var(--gold);font-size:14px;line-height:1;}
.exi{padding:10px 0;border-bottom:1px solid #1d1d1d;display:grid;grid-template-columns:26px minmax(0,1fr) auto;align-items:start;gap:10px;}
.exi:last-child{border-bottom:none;}
.exn{width:24px;height:24px;background:var(--gold);color:var(--dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;margin-top:1px;}
.exii{flex:1;}
.exnm{font-size:14px;font-weight:700;color:var(--txt);line-height:1.55;}
.exs{font-size:12px;color:var(--gold);margin-top:2px;font-weight:700;}
.wbg{background:#101010;border:1px solid #333;border-radius:4px;padding:5px 9px;font-size:11px;color:var(--gl);white-space:nowrap;font-weight:800;}
.plfoot{text-align:center;padding:20px;color:#2a2a2a;font-size:12px;border-top:1px solid #181818;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:9998;}
.modal.on{display:flex;}
.mbox{width:100%;max-width:360px;background:var(--d3);border:1px solid #2a2a2a;border-radius:5px;padding:20px;text-align:center;}
.mbox h3{font-size:17px;color:var(--gold);margin-bottom:12px;}
.certbox{width:100%;max-width:960px;max-height:92vh;background:var(--d3);border:1px solid #2a2a2a;border-radius:7px;padding:14px;text-align:center;overflow:auto;}
.certbox h3{font-size:17px;color:var(--gold);margin-bottom:10px;}
.certfull{width:100%;max-height:76vh;object-fit:contain;background:#090909;border-radius:5px;display:block;margin:0 auto 12px;}
.qrimg{width:300px;height:300px;background:#fff;border-radius:4px;padding:12px;margin:0 auto 12px;display:block;image-rendering:pixelated;}
.qlink{font-size:11px;color:var(--dim);background:#111;border:1px solid #252525;border-radius:3px;padding:9px;word-break:break-all;direction:ltr;text-align:left;margin-bottom:12px;}
.macts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

};
const CERT_BASE='https://truck-f4c15.web.app/certificates/';
const CERTS=[
  ['مدرب لياقة شخصية','IFPA','personal-fitness-trainer.jpeg'],
  ['خبرة تدريب وبناء أجسام','ALOFUK Academy Malaysia','alofuk-experience.jpeg'],
  ['الدورة التدريبية فئة C','الاتحاد العراقي الوطني','iraqi-federation-category-c.jpeg'],
  ['تحليل InBody','IFPA Iraq Academy','inbody-analysis-workshop.jpeg'],
  ['المكملات الرياضية','IFPA Iraq Academy','sports-supplements-workshop.jpeg'],
  ['Cross Training','IFPA Iraq Academy','cross-training-workshop.jpeg'],
  ['The Diet Masters','The Diet Masters','diet-masters.jpeg']
];

let trainees=[],editId=null,curPlan=null,demoMode=false;
const DEMO_KEY='skyGymDemoTrainees';

/* AUTH */
function authVals(){return{email:document.getElementById('lemail').value.trim(),pass:document.getElementById('lpass').value};}
async function loginCoach(){
  if(!window.$fb||!window.$auth){toast('Firebase غير متصل');return;}
  const v=authVals();if(!v.email||!v.pass){toast('أدخل الإيميل وكلمة السر');return;}
  try{await window.$signIn(window.$auth,v.email,v.pass);}catch(e){toast('فشل الدخول: '+authMsg(e));}
}
function normalizePhone(v){return String(v||'').replace(/\D/g,'');}
function makeAccessCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const bytes=new Uint8Array(12);
  crypto.getRandomValues(bytes);
  let out='';
  for(let i=0;i<bytes.length;i++)out+=chars[bytes[i]%chars.length];
  return out;
}
async function loginTrainee(){
  const v=authVals(),phone=normalizePhone(v.email),code=v.pass.trim().toUpperCase();
  if(!phone||!code){toast('أدخل الهاتف والكود');return;}
  try{
    const snap=await window.$getDoc(window.$doc(window.$db,'publicAccess',code));
    if(!snap.exists()){toast('الكود غير صحيح');return;}
    const data=snap.data();
    if(normalizePhone(data.phone)!==phone){toast('رقم الهاتف لا يطابق الكود');return;}
    await openPublicPlan(data.planId);
  }catch(e){toast('تعذر فتح البرنامج');}
}
async function unifiedLogin(){
  const v=authVals();
  if(!v.email||!v.pass){toast('أدخل بيانات الدخول');return;}
  if(v.email.includes('@'))await loginCoach();
  else await loginTrainee();
}
function demoLogin(){
  demoMode=true;
  document.getElementById('coachEmail').textContent='demo@skygym.local';
  document.getElementById('demoMark').classList.add('on');
  show('s1');loadTrainees();toast('وضع تجريبي — لا يؤثر على Firebase');
}
async function logoutCoach(){
  if(demoMode){demoMode=false;trainees=[];document.getElementById('demoMark').classList.remove('on');showAuth();toast('تم الخروج من الوضع التجريبي');return;}
  if(window.$auth)await window.$signOut(window.$auth);
}
function authMsg(e){
  const c=e?.code||'';
  if(c.includes('invalid-credential'))return'البيانات غير صحيحة';
  if(c.includes('email-already-in-use'))return'الإيميل مستخدم مسبقاً';
  if(c.includes('weak-password'))return'كلمة السر ضعيفة';
  if(c.includes('network'))return'مشكلة اتصال';
  return e?.message||'خطأ غير معروف';
}

/* FIREBASE */
function demoRead(){try{return JSON.parse(localStorage.getItem(DEMO_KEY)||'[]');}catch(e){return[];}}
function demoWrite(list){localStorage.setItem(DEMO_KEY,JSON.stringify(list));}
async function fbA(d){
  if(demoMode){const list=demoRead(),id='demo-'+Date.now();list.push({id,...d});demoWrite(list);return id;}
  try{return(await window.$add(window.$col(window.$db,'trainees'),d)).id;}catch(e){toast('خطأ: '+e.message);return null;}
}
async function fbG(){
  if(demoMode)return demoRead();
  try{
    const uid=window.$auth?.currentUser?.uid||'';
    const q=window.$query(window.$col(window.$db,'trainees'),window.$where('coachUid','==',uid));
    return(await window.$get(q)).docs.map(x=>({id:x.id,...x.data()}));
  }catch(e){toast('تعذر تحميل المتدربين');return[];}
}
async function fbD(id){
  if(demoMode){demoWrite(demoRead().filter(t=>t.id!==id));return;}
  try{await window.$del(window.$doc(window.$db,'trainees',id));}catch(e){toast('خطأ حذف');}
}
async function fbU(id,d){
  if(demoMode){demoWrite(demoRead().map(t=>t.id===id?{id,...t,...d}:t));return;}
  try{await window.$upd(window.$doc(window.$db,'trainees',id),d);}catch(e){toast('خطأ تحديث');}
}
function publicPlanData(t){
  return {
    name:t.name||'',height:t.height||0,weight:t.weight||0,age:t.age||0,
    goal:t.goal||'',level:t.level||'',notes:t.notes||'',days:t.days||[],
    coachUid:t.coachUid||window.$auth?.currentUser?.uid||'',updatedAt:new Date().toISOString()
  };
}
async function fbPublishPlan(t){
  if(demoMode)return true;
  if(!t?.id)return false;
  if(!t.accessCode)t.accessCode=makeAccessCode(t.id);
  try{
    await window.$set(window.$doc(window.$db,'publicPlans',t.id),publicPlanData(t));
    await window.$set(window.$doc(window.$db,'publicAccess',t.accessCode),{
      planId:t.id,
      phone:normalizePhone(t.phone),
      coachUid:t.coachUid||window.$auth?.currentUser?.uid||'',
      updatedAt:new Date().toISOString()
    });
    return true;
  }catch(e){toast('تعذر تحديث رابط QR');return false;}
}
async function fbDelPublic(id,code){
  if(demoMode)return;
  try{await window.$del(window.$doc(window.$db,'publicPlans',id));}catch(e){}
  if(code)try{await window.$del(window.$doc(window.$db,'publicAccess',code));}catch(e){}
}
async function fbPublicOne(id){
  if(demoMode)return demoRead().find(t=>t.id===id)||null;
  try{const snap=await window.$getDoc(window.$doc(window.$db,'publicPlans',id));return snap.exists()?{id:snap.id,...snap.data()}:null;}catch(e){toast('تعذر فتح برنامج المتدرب');return null;}

/* SUBSCRIPTIONS */
function isoDate(d){return d.toISOString().slice(0,10);}
function addMonths(dateStr,months){
  const d=dateStr?new Date(dateStr+'T00:00:00'):new Date();
  const day=d.getDate();d.setMonth(d.getMonth()+Number(months||1));
  if(d.getDate()<day)d.setDate(0);
  return isoDate(d);
}
function calcSubEnd(){
  const s=document.getElementById('fsd').value,m=document.getElementById('fmo').value||1;
  document.getElementById('fed').value=s?addMonths(s,m):'';
}
function subInfo(t){
  const sub=t.subscription||{};
  if(!sub.endDate)return{state:'none',label:'لا يوجد اشتراك',days:null,cls:'none'};
  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date(sub.endDate+'T00:00:00');
  const days=Math.ceil((end-today)/86400000);
  if(days<0)return{state:'expired',label:'منتهي',days,cls:'expired'};
  if(days<=7)return{state:'soon',label:'ينتهي قريباً',days,cls:'soon'};
  return{state:'ok',label:'فعال',days,cls:'ok'};
}
async function renewSub(id,months=1){
  const t=trainees.find(x=>x.id===id);if(!t)return;
  const info=subInfo(t),base=info.state==='expired'||!t.subscription?.endDate?isoDate(new Date()):t.subscription.endDate;
  const subscription={...(t.subscription||{}),startDate:t.subscription?.startDate||isoDate(new Date()),months:Number(t.subscription?.months||months),endDate:addMonths(base,months),renewedAt:new Date().toISOString()};
  await fbU(id,{subscription});
  t.subscription=subscription;updStats();renderList();toast('✅ تم تجديد الاشتراك شهر');
}

function autoFillExercise(btn){
  const card=btn.closest('.xcard');
  const base=Number(prompt('اكتب وزن الأسبوع الأول بالكيلو، مثال: 30'));
  if(!base){toast('لم يتم إدخال وزن صحيح');return;}
  const stepInput=prompt('كم الزيادة كل أسبوع؟ مثال: 5', '5');
  if(stepInput===null)return;
  const step=Number(stepInput);
  if(Number.isNaN(step)){toast('الزيادة غير صحيحة');return;}
  const reps=WKS.map(w=>w.reps);
  for(let i=1;i<=6;i++){
    card.querySelector('.xr'+i).value=reps[i-1];
    card.querySelector('.xw'+i).value=(base+(i-1)*step)+' كغ';
  }
  toast('تمت تعبئة الأسابيع الستة');
}

  return`<div class="plh"><div class="plname">${t.name}</div><div class="plsub">${t.goal||''} · ${t.level||''} · 6 أسابيع تقدمية</div><div class="sbar"><div class="sb"><span class="sv">${t.height||'—'}</span><span class="sl">سم الطول</span></div><div class="sb"><span class="sv">${t.weight||'—'}</span><span class="sl">كغ الوزن</span></div><div class="sb"><span class="sv">${bmi}</span><span class="sl">BMI</span></div><div class="sb"><span class="sv">${t.age||'—'}</span><span class="sl">العمر</span></div></div></div>${buildCerts()}${t.notes?`<div class="pnote"><div class="pni"><p>📝 <strong>ملاحظات المدرب:</strong> ${t.notes}</p></div></div>`:''}<div class="wnav">${wn}</div>${whtml}<div class="plfoot">الأوزان تقديرية — اضبطها حسب قدرتك الفعلية</div>`;
}
function swW(n){document.querySelectorAll('.wcont').forEach(e=>e.classList.remove('on'));document.querySelectorAll('.wtab').forEach(e=>e.classList.remove('on'));const wc=document.getElementById('pw-'+n)||document.getElementById('sw-'+n);const tabs=document.querySelectorAll('.wtab');if(wc)wc.classList.add('on');if(tabs[n])tabs[n].classList.add('on');}

/* DOWNLOAD */
function dlPlan(){
  if(!curPlan)return;
  const t=curPlan,inner=buildPlan(t,true);
  const css=document.querySelector('style').textContent;
  const certModal=`<div class="modal" id="certModal" onclick="closeCert(event)"><div class="certbox" onclick="event.stopPropagation()"><h3 id="certModalTitle">شهادة المدرب</h3><img class="certfull" id="certModalImg" alt="شهادة المدرب"><button class="btn br" onclick="closeCert()">إغلاق</button></div></div>`;
  const script=`<script>const CERT_BASE=${JSON.stringify(CERT_BASE)};const CERTS=${JSON.stringify(CERTS)};function openCert(i){const c=CERTS[i];if(!c)return;document.getElementById('certModalTitle').textContent=c[0]+' — '+c[1];document.getElementById('certModalImg').src=CERT_BASE+c[2];document.getElementById('certModal').classList.add('on');}function closeCert(e){if(e&&e.target.id!=='certModal')return;document.getElementById('certModal').classList.remove('on');}function sw(n){document.querySelectorAll('.wcont').forEach(e=>e.classList.remove('on'));document.querySelectorAll('.wtab').forEach(e=>e.classList.remove('on'));const wc=document.getElementById('sw-'+n);const tabs=document.querySelectorAll('.wtab');if(wc)wc.classList.add('on');if(tabs[n])tabs[n].classList.add('on');}<\/script>`;
  const html=`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>برنامج ${t.name}</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"><style>${css.replace(/\/\* ── S[12] .+[\s\S]+?(?=\/\* ── S3)/,'').replace('#s1{','#s1_off{').replace('#s2{','#s2_off{')}</style></head><body style="background:#0A0A0A">${certModal}${inner}${script}</body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`برنامج-${t.name}.html`;a.click();
  toast('✅ تم التحميل — أرسله واتساب!');
}

window.addEventListener('fbReady',()=>{
  const publicPlanId=new URLSearchParams(location.search).get('plan');
  if(!window.$fb||!window.$auth){
    showAuth();
    document.querySelector('.authmsg').innerHTML='<span style="color:var(--red);font-weight:700">Firebase غير متصل.</span><br>أضف إعدادات Firebase في أعلى الملف ثم فعّل Authentication.';
    return;
  }
  if(publicPlanId){openPublicPlan(publicPlanId);return;}
  window.$authState(window.$auth,user=>{
    if(user){
      document.getElementById('coachEmail').textContent=user.email||'مدرب';
      show('s1');loadTrainees();
    }else{
      trainees=[];document.getElementById('coachEmail').textContent='—';document.getElementById('demoMark').classList.remove('on');showAuth();
    }
  });
});
